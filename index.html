<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warehouse Map</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --amber:        #f59e0b;
  --green:        #16a34a;
  --green-light:  #dcfce7;
  --blue:         #2563eb;
  --blue-light:   #dbeafe;
  --orange:       #ea580c;
  --orange-light: #ffedd5;
  --grey:         #64748b;
  --grey-light:   #f1f5f9;
  --border:       #e2e8f0;
  --text:         #0f172a;
  --text-mid:     #475569;
  --text-soft:    #94a3b8;
  --bg:           #f8fafc;
  --white:        #ffffff;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* HEADER */
.header {
  background: #0f172a;
  padding: 12px 16px 10px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
  position: relative;
  z-index: 20;
}
.header-top { display: flex; align-items: center; gap: 8px; }
.logo { font-size: 17px; font-weight: 900; color: var(--amber); flex: 1; }
.status-badge {
  font-size: 11px; font-weight: 600;
  padding: 3px 9px; border-radius: 20px;
  background: #1e293b; color: #64748b;
  white-space: nowrap;
}
.status-badge.loaded { background: #14532d; color: #86efac; }
.header-btns { display: flex; gap: 6px; }
.hbtn {
  border: none; border-radius: 8px; cursor: pointer;
  font-family: 'Inter', sans-serif;
  font-size: 12px; font-weight: 700;
  padding: 7px 12px; white-space: nowrap;
  touch-action: manipulation;
}
.hbtn-ghost { background: #1e293b; color: #94a3b8; }
.hbtn-amber { background: var(--amber); color: #000; }

/* SEARCH */
.search-wrap { position: relative; }
.search-input {
  width: 100%;
  background: #1e293b;
  border: 1.5px solid #334155;
  border-radius: 10px;
  color: #f1f5f9;
  font-family: 'Inter', sans-serif;
  font-size: 16px; font-weight: 500;
  padding: 10px 40px 10px 14px;
  outline: none;
  touch-action: manipulation;
}
.search-input::placeholder { color: #475569; }
.search-input:focus { border-color: var(--amber); }
.search-clear {
  position: absolute; right: 12px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none;
  color: #475569; cursor: pointer;
  font-size: 18px; padding: 4px;
  display: none;
  touch-action: manipulation;
}
.search-clear.visible { display: block; }

/* AISLE TABS */
.aisle-tabs {
  display: none;
  background: var(--white);
  border-bottom: 2px solid var(--border);
  overflow-x: auto;
  flex-shrink: 0;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  position: relative;
  z-index: 10;
}
.aisle-tabs::-webkit-scrollbar { display: none; }
.aisle-tabs.visible { display: flex; }
.aisle-tab {
  background: none; border: none;
  border-bottom: 3px solid transparent;
  color: var(--text-soft);
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  font-size: 15px; font-weight: 800;
  padding: 16px 20px 13px;
  white-space: nowrap; flex-shrink: 0;
  min-height: 56px;
  touch-action: manipulation;
}
.aisle-tab.active { color: var(--text); border-bottom-color: var(--amber); }

/* VIEW TOGGLE */
.view-toggle {
  display: none;
  background: var(--white);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}
.view-toggle.visible { display: flex; }
.view-btn {
  flex: 1; background: none; border: none;
  border-bottom: 3px solid transparent;
  color: var(--text-soft); cursor: pointer;
  font-family: 'Inter', sans-serif;
  font-size: 15px; font-weight: 700;
  padding: 14px 8px 11px;
  min-height: 50px;
  touch-action: manipulation;
}
.view-btn.active { color: var(--text); border-bottom-color: var(--amber); }

/* DROP ZONE */
.drop-zone {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px; padding: 24px; text-align: center;
}
.drop-zone-icon { font-size: 56px; }
.drop-zone-title { font-size: 20px; font-weight: 800; }
.drop-zone-sub { font-size: 14px; color: var(--text-soft); line-height: 1.6; }
.drop-zone-btn {
  background: var(--amber); color: #000;
  border: none; border-radius: 12px;
  font-family: 'Inter', sans-serif;
  font-size: 15px; font-weight: 800;
  padding: 14px 32px; cursor: pointer;
  touch-action: manipulation;
}
#file-input { display: none; }

/* LIST VIEW */
.list-view {
  flex: 1; overflow-y: auto; display: none;
  background: var(--bg);
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
}
.list-view.visible { display: block; }

.result-item {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px;
  display: flex; align-items: center; gap: 12px;
  min-height: 68px;
  cursor: pointer;
  touch-action: manipulation;
}
.result-item:active { background: var(--grey-light); }
.result-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.dot-pick    { background: var(--green); }
.dot-bulk    { background: var(--blue); }
.dot-damaged { background: var(--orange); }
.dot-empty   { background: var(--border); }
.result-body { flex: 1; min-width: 0; }
.result-loc { font-size: 12px; font-weight: 700; color: var(--text-soft); margin-bottom: 3px; }
.result-desc { font-size: 16px; font-weight: 700; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.result-desc.empty { color: var(--text-soft); font-weight: 400; font-style: italic; }
.result-arrow { color: var(--text-soft); font-size: 20px; flex-shrink: 0; }
.no-results { text-align: center; padding: 60px 24px; color: var(--text-soft); font-size: 15px; font-weight: 500; }

/* MAP VIEW */
.map-view {
  flex: 1; overflow: auto; display: none;
  background: #e2e8f0; padding: 12px;
  -webkit-overflow-scrolling: touch;
}
.map-view.visible { display: flex; flex-direction: column; }
.warehouse { display: flex; flex-direction: column; gap: 8px; min-width: max-content; flex: 1; }
.aisle-row { display: flex; gap: 3px; align-items: stretch; flex: 1; }
.side-label {
  writing-mode: vertical-rl; transform: rotate(180deg);
  font-size: 9px; font-weight: 700; letter-spacing: 2px; color: #94a3b8;
  min-width: 28px; display: flex; align-items: center; justify-content: center;
  background: #cbd5e1; border-radius: 3px;
}
.walkway-row { display: flex; gap: 3px; align-items: center; }
.walkway-spacer { min-width: 28px; }
.walkway {
  flex: 1; height: 14px;
  border-top: 1.5px dashed #94a3b8; border-bottom: 1.5px dashed #94a3b8;
  display: flex; align-items: center; justify-content: center;
}
.walkway-lbl { font-size: 9px; font-weight: 700; letter-spacing: 5px; color: #94a3b8; text-transform: uppercase; }

.bay {
  display: flex; flex-direction: column; flex: 1;
  background: var(--white); border-radius: 4px;
  border: 1.5px solid var(--border); overflow: hidden;
  cursor: pointer; touch-action: manipulation;
}
.bay.highlighted {
  border-color: var(--amber) !important;
  box-shadow: 0 0 0 2px var(--amber);
  animation: bay-pulse 1.4s ease infinite;
}
@keyframes bay-pulse {
  0%,100% { box-shadow: 0 0 0 2px var(--amber); }
  50%      { box-shadow: 0 0 0 2px var(--amber), 0 0 12px rgba(245,158,11,0.4); }
}
.bay-header {
  background: #f1f5f9; border-bottom: 1.5px solid var(--border);
  padding: 4px 6px; display: flex; align-items: center; justify-content: space-between;
}
.bay-num { font-size: 13px; font-weight: 900; color: var(--text); }
.bay-dir { font-size: 11px; font-weight: 700; color: var(--amber); }
.bay-shelves { display: flex; flex-direction: column; gap: 1px; padding: 1px; flex: 1; }
.shelf {
  display: flex; align-items: center; gap: 3px;
  padding: 3px 5px; border-radius: 2px; flex: 1;
  min-width: 90px; border-left: 3px solid transparent;
}
.shelf.pick    { background: var(--green-light);  border-left-color: var(--green);  }
.shelf.bulk    { background: var(--blue-light);   border-left-color: var(--blue);   }
.shelf.damaged { background: var(--orange-light); border-left-color: var(--orange); }
.shelf.empty   { background: #f8fafc;             border-left-color: var(--border); }
.shelf-lbl { font-size: 9px; font-weight: 800; min-width: 10px; opacity: 0.55; }
.shelf.pick    .shelf-lbl { color: var(--green); }
.shelf.bulk    .shelf-lbl { color: var(--blue); }
.shelf.damaged .shelf-lbl { color: var(--orange); }
.shelf.empty   .shelf-lbl { color: var(--grey); }
.shelf-txt { font-size: 9px; font-weight: 700; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 110px; }
.shelf.pick    .shelf-txt { color: #14532d; }
.shelf.bulk    .shelf-txt { color: #1e3a8a; }
.shelf.damaged .shelf-txt { color: #7c2d12; }
.shelf.empty   .shelf-txt { color: var(--text-soft); }
.shelf-badge { font-size: 8px; font-weight: 700; padding: 1px 4px; border-radius: 3px; background: rgba(0,0,0,0.06); color: var(--text-soft); flex-shrink: 0; }

/* DETAIL PANEL */
.detail-panel {
  position: fixed; inset: 0;
  background: var(--white);
  transform: translateX(100%);
  transition: transform 0.25s cubic-bezier(0.22,1,0.36,1);
  z-index: 200;
  display: flex; flex-direction: column; overflow: hidden;
}
.detail-panel.open { transform: translateX(0); }
.detail-header {
  background: #0f172a; padding: 16px;
  display: flex; align-items: center; gap: 12px; flex-shrink: 0;
}
.detail-back {
  background: #1e293b; border: none; border-radius: 8px;
  color: #f1f5f9; cursor: pointer; font-family: 'Inter', sans-serif;
  font-size: 14px; font-weight: 700; padding: 8px 14px;
  touch-action: manipulation;
}
.detail-title { font-size: 20px; font-weight: 900; color: var(--amber); flex: 1; }
.detail-tags { display: flex; gap: 6px; flex-wrap: wrap; padding: 12px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.detail-tag { background: var(--grey-light); border-radius: 6px; font-size: 12px; font-weight: 700; color: var(--text-mid); padding: 4px 10px; }
.detail-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.detail-shelf-section { border-bottom: 1px solid var(--border); }
.detail-shelf-head { display: flex; align-items: center; gap: 10px; padding: 12px 16px 8px; background: var(--grey-light); }
.detail-shelf-name { font-size: 14px; font-weight: 800; color: var(--text); }
.detail-shelf-badge { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 6px; border: 1.5px solid; }
.pick-badge    { border-color: var(--green);  color: var(--green);  background: var(--green-light); }
.bulk-badge    { border-color: var(--blue);   color: var(--blue);   background: var(--blue-light); }
.damaged-badge { border-color: var(--orange); color: var(--orange); background: var(--orange-light); }
.empty-badge   { border-color: var(--border); color: var(--grey);   background: var(--grey-light); }
.detail-item { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--border); min-height: 56px; }
.detail-item:last-child { border-bottom: none; }
.detail-item-pos { font-size: 12px; font-weight: 700; color: var(--text-soft); min-width: 28px; background: var(--grey-light); border-radius: 5px; padding: 3px 6px; text-align: center; flex-shrink: 0; }
.detail-item-name { font-size: 16px; font-weight: 700; color: var(--text); flex: 1; line-height: 1.3; }
.detail-item-name.empty { color: var(--text-soft); font-weight: 400; font-style: italic; }

/* LEGEND */
.legend {
  display: none; gap: 12px; padding: 8px 16px;
  background: var(--white); border-top: 1px solid var(--border);
  flex-shrink: 0; overflow-x: auto; scrollbar-width: none;
}
.legend.visible { display: flex; }
.legend::-webkit-scrollbar { display: none; }
.legend-item { display: flex; align-items: center; gap: 5px; white-space: nowrap; }
.legend-dot  { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.legend-lbl  { font-size: 11px; font-weight: 600; color: var(--text-soft); }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">▣ WAREHOUSE MAP</div>
    <div class="status-badge" id="status-badge">No data</div>
    <div class="header-btns">
      <button class="hbtn hbtn-ghost" id="update-btn" style="display:none">↑ Update</button>
      <button class="hbtn hbtn-amber" id="export-btn" style="display:none">↓ Export JSON</button>
    </div>
  </div>
  <div class="search-wrap">
    <input class="search-input" id="search-input" type="text"
      placeholder="Search bin or item..."
      autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
      oninput="handleSearch()" onkeyup="handleSearch()" onchange="handleSearch()">
    <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
  </div>
</div>

<div class="aisle-tabs" id="aisle-tabs"></div>

<div class="view-toggle" id="view-toggle">
  <button class="view-btn active" id="btn-list" onclick="setView('list')">☰ LIST</button>
  <button class="view-btn" id="btn-map" onclick="setView('map')">⊞ MAP</button>
</div>

<div class="drop-zone" id="drop-zone">
  <div class="drop-zone-icon">📦</div>
  <div class="drop-zone-title">Load Warehouse Data</div>
  <div class="drop-zone-sub">Load your SAP B1 export<br>Supports CSV or Excel (.xlsx)</div>
  <button class="drop-zone-btn">CHOOSE FILE</button>
  <input type="file" id="file-input" accept=".csv,.xlsx,.xls">
</div>

<div class="list-view" id="list-view"></div>

<div class="map-view" id="map-view">
  <div class="warehouse" id="warehouse"></div>
</div>

<div class="legend" id="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div><span class="legend-lbl">Pick Face</span></div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div><span class="legend-lbl">Bulk</span></div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--orange)"></div><span class="legend-lbl">Damaged</span></div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--border)"></div><span class="legend-lbl">Empty</span></div>
</div>

<div class="detail-panel" id="detail-panel">
  <div class="detail-header">
    <button class="detail-back" id="detail-back" onclick="document.getElementById('detail-panel').classList.remove('open')">← Back</button>
    <div class="detail-title" id="detail-title">Bay</div>
  </div>
  <div class="detail-tags" id="detail-tags"></div>
  <div class="detail-body" id="detail-body"></div>
</div>

<script>
let warehouseData = {};
let allLocations  = [];
let currentAisle  = null;
let currentView   = 'list';

function getDirection(bay) {
  const pair = Math.floor((bay - 1) / 2);
  const isOdd = bay % 2 === 1;
  const pairLeft = pair % 2 === 0;
  return isOdd ? (pairLeft ? '←' : '→') : (pairLeft ? '→' : '←');
}

function getShelfClass(type, inactive) {
  if (inactive === 'Yes') return 'empty';
  if (!type) return 'empty';
  const t = type.toUpperCase();
  if (t.includes('PICK')) return 'pick';
  if (t.includes('BULK')) return 'bulk';
  if (t.includes('DAMAGED')) return 'damaged';
  return 'empty';
}

// ── PARSE ──
function parseData(rows) {
  warehouseData = {};
  allLocations  = [];

  let headerIdx = -1, colMap = {};
  for (let i = 0; i < Math.min(5, rows.length); i++) {
    const row = rows[i].map(c => String(c || '').trim().toLowerCase());
    if (row.some(c => c.includes('bin') || c.includes('location'))) {
      headerIdx = i;
      row.forEach((c, idx) => {
        if (c.includes('bin') || c.includes('location')) colMap.loc = idx;
        if (c.includes('description') || c.includes('item desc')) colMap.desc = idx;
        if (c.includes('type')) colMap.type = idx;
        if (c.includes('inactive')) colMap.inactive = idx;
      });
      break;
    }
  }
  if (headerIdx === -1 || colMap.loc === undefined) {
    colMap = { loc: 1, desc: 2, type: 5, inactive: 6 };
    headerIdx = rows[0] && String(rows[0][1]||'').toLowerCase().includes('bin') ? 0 : -1;
  }

  const dataRows = rows.slice(headerIdx + 1);
  for (const row of dataRows) {
    if (!row || row.length < 2) continue;
    const loc      = String(row[colMap.loc]      || '').trim();
    const desc     = String(row[colMap.desc]     || '').trim();
    const type     = String(row[colMap.type]     || '').trim();
    const inactive = String(row[colMap.inactive] || '').trim();

    let aisle, bay, shelf, pos;
    const mFull = loc.match(/\d{2}-([A-Z]{2})-(\d+)-([A-Z])-(\d+)/);
    const mBay  = loc.match(/\d{2}-([A-Z]{2})-(\d+)$/);
    if (mFull) {
      aisle = mFull[1]; bay = parseInt(mFull[2]); shelf = mFull[3]; pos = parseInt(mFull[4]);
    } else if (mBay) {
      aisle = mBay[1]; bay = parseInt(mBay[2]); shelf = 'WHOLE'; pos = 1;
    } else { continue; }

    if (!warehouseData[aisle])             warehouseData[aisle] = {};
    if (!warehouseData[aisle][bay])        warehouseData[aisle][bay] = {};
    if (!warehouseData[aisle][bay][shelf]) warehouseData[aisle][bay][shelf] = [];
    warehouseData[aisle][bay][shelf].push({ pos, loc, desc, type, inactive });
    allLocations.push({ aisle, bay, shelf, pos, loc, desc, type, inactive });
  }

  Object.values(warehouseData).forEach(bays =>
    Object.values(bays).forEach(shelves =>
      Object.values(shelves).forEach(arr => arr.sort((a,b) => a.pos - b.pos))
    )
  );

  const aisles = Object.keys(warehouseData).sort();
  currentAisle = aisles[0];
  buildAisleTabs(aisles);
  showUI();
  renderList('');

  document.getElementById('status-badge').textContent = allLocations.length + ' locs · ' + aisles.length + ' aisles';
  document.getElementById('status-badge').className = 'status-badge loaded';
  document.getElementById('export-btn').style.display = '';
  document.getElementById('update-btn').style.display = '';

  try {
    localStorage.setItem('warehouseData', JSON.stringify(warehouseData));
    localStorage.setItem('allLocations',  JSON.stringify(allLocations));
    localStorage.setItem('warehouseLoadedAt', new Date().toLocaleString());
  } catch(e) {}
}

function showUI() {
  document.getElementById('drop-zone').style.display = 'none';
  document.getElementById('aisle-tabs').classList.add('visible');
  document.getElementById('view-toggle').classList.add('visible');
  document.getElementById('legend').classList.add('visible');
  setView('list');
}

// ── AISLE TABS ──
function buildAisleTabs(aisles) {
  var tabBar = document.getElementById('aisle-tabs');
  tabBar.innerHTML = '';
  aisles.forEach(function(aisle) {
    var btn = document.createElement('button');
    btn.className = 'aisle-tab' + (aisle === currentAisle ? ' active' : '');
    btn.textContent = aisle;
    btn.dataset.aisle = aisle;
    tabBar.appendChild(btn);
  });
}

// Tab delegation — single listener on the container
document.getElementById('aisle-tabs').addEventListener('click', function(e) {
  var btn = e.target.closest('.aisle-tab');
  if (!btn) return;
  switchAisle(btn.dataset.aisle);
});

function switchAisle(aisle) {
  currentAisle = aisle;
  document.querySelectorAll('.aisle-tab').forEach(function(b) {
    b.classList.toggle('active', b.textContent === aisle);
  });
  var q = document.getElementById('search-input').value;
  if (currentView === 'list') renderList(q);
  else renderWarehouse();
}

// ── VIEW TOGGLE ──
function setView(v) {
  currentView = v;
  document.getElementById('btn-list').classList.toggle('active', v === 'list');
  document.getElementById('btn-map').classList.toggle('active',  v === 'map');
  document.getElementById('list-view').classList.toggle('visible', v === 'list');
  document.getElementById('map-view').classList.toggle('visible',  v === 'map');
  if (v === 'map') renderWarehouse();
}

// ── LIST ──
function renderList(q) {
  const el    = document.getElementById('list-view');
  const query = (q || '').toUpperCase().trim();
  let locs    = allLocations.filter(function(l) { return l.aisle === currentAisle; });

  if (query) {
    locs = locs.filter(function(l) {
      return l.loc.toUpperCase().indexOf(query) >= 0 || l.desc.toUpperCase().indexOf(query) >= 0;
    });
    if (locs.length === 0) {
      // Try other aisles
      const other = allLocations.find(function(l) {
        return l.aisle !== currentAisle &&
          (l.loc.toUpperCase().indexOf(query) >= 0 || l.desc.toUpperCase().indexOf(query) >= 0);
      });
      if (other) {
        currentAisle = other.aisle;
        document.querySelectorAll('.aisle-tab').forEach(function(b) {
          b.classList.toggle('active', b.textContent === currentAisle);
        });
        locs = allLocations.filter(function(l) {
          return l.aisle === currentAisle &&
            (l.loc.toUpperCase().indexOf(query) >= 0 || l.desc.toUpperCase().indexOf(query) >= 0);
        });
      }
    }
  }

  if (locs.length === 0) {
    el.innerHTML = '<div class="no-results">' + (query ? 'No results for "' + q + '"' : 'No locations') + '</div>';
    return;
  }

  el.innerHTML = locs.map(function(l) {
    const sc = getShelfClass(l.type, l.inactive);
    const empty = !l.desc || l.inactive === 'Yes';
    const desc = l.desc || (l.inactive === 'Yes' ? 'Inactive' : 'Empty');
    return '<div class="result-item" data-aisle="' + l.aisle + '" data-bay="' + l.bay + '">' +
      '<div class="result-dot dot-' + sc + '"></div>' +
      '<div class="result-body">' +
        '<div class="result-loc">' + l.loc + '</div>' +
        '<div class="result-desc' + (empty ? ' empty' : '') + '">' + desc + '</div>' +
      '</div>' +
      '<div class="result-arrow">›</div>' +
    '</div>';
  }).join('');
}

// ── MAP ──
function renderWarehouse(highlightBays, highlightLocs) {
  const container = document.getElementById('warehouse');
  container.innerHTML = '';
  if (!currentAisle || !warehouseData[currentAisle]) return;

  const bayData  = warehouseData[currentAisle];
  const bays     = Object.keys(bayData).map(Number).sort(function(a,b){return a-b;});
  const oddBays  = bays.filter(function(b){return b%2===1;});
  const evenBays = bays.filter(function(b){return b%2===0;});

  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex;flex-direction:column;gap:8px;flex:1;';

  function makeRow(side, bayList) {
    const row = document.createElement('div');
    row.className = 'aisle-row';
    const lbl = document.createElement('div');
    lbl.className = 'side-label';
    lbl.textContent = side;
    row.appendChild(lbl);
    bayList.forEach(function(bay) { row.appendChild(renderBay(bay, highlightBays, highlightLocs)); });
    return row;
  }

  wrap.appendChild(makeRow('ODD', oddBays));

  const ww = document.createElement('div'); ww.className = 'walkway-row';
  const ws = document.createElement('div'); ws.className = 'walkway-spacer';
  const wk = document.createElement('div'); wk.className = 'walkway';
  wk.innerHTML = '<span class="walkway-lbl">walkway</span>';
  ww.appendChild(ws); ww.appendChild(wk);
  wrap.appendChild(ww);

  wrap.appendChild(makeRow('EVEN', evenBays));
  container.appendChild(wrap);
}

function renderBay(bay, highlightBays, highlightLocs) {
  const shelves = warehouseData[currentAisle][bay];
  const dir     = getDirection(bay);
  const isHL    = highlightBays && highlightBays.has(bay);

  const bayEl = document.createElement('div');
  bayEl.className = 'bay' + (isHL ? ' highlighted' : '');

  const hdr = document.createElement('div');
  hdr.className = 'bay-header';
  hdr.innerHTML = '<span class="bay-num">' + String(bay).padStart(2,'0') + '</span><span class="bay-dir">' + dir + '</span>';
  bayEl.appendChild(hdr);

  const shelvesEl = document.createElement('div');
  shelvesEl.className = 'bay-shelves';

  Object.keys(shelves).sort().reverse().forEach(function(sl) {
    const items   = shelves[sl];
    const primary = items[0];
    const sc      = getShelfClass(primary.type, primary.inactive);
    const isHLS   = highlightLocs && items.some(function(i){return highlightLocs.has(i.loc);});

    const shelfEl = document.createElement('div');
    shelfEl.className = 'shelf ' + sc;
    if (isHLS) shelfEl.style.outline = '2px solid var(--amber)';

    if (sl === 'WHOLE') {
      shelfEl.style.cssText += 'flex-direction:column;align-items:center;justify-content:center;min-height:40px;';
      shelfEl.innerHTML = '<span class="shelf-lbl" style="font-size:7px;">WHOLE</span><span class="shelf-txt" style="text-align:center;">' + (primary.desc||'—') + '</span>';
    } else {
      shelfEl.innerHTML = '<span class="shelf-lbl">' + sl + '</span><span class="shelf-txt">' + (primary.desc||(primary.inactive==='Yes'?'Inactive':'—')) + '</span>' + (items.length>1?'<span class="shelf-badge">+' + (items.length-1) + '</span>':'');
    }
    shelvesEl.appendChild(shelfEl);
  });

  bayEl.appendChild(shelvesEl);
  bayEl.addEventListener('click', function() { openDetail(currentAisle, bay); });
  if (isHL) setTimeout(function(){bayEl.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});},100);
  return bayEl;
}

// ── DETAIL ──
function openDetail(aisle, bay) {
  const shelves = warehouseData[aisle][bay];
  const dir     = getDirection(bay);
  const shelfLetters = Object.keys(shelves).sort().reverse();
  const totalLocs    = Object.values(shelves).reduce(function(s,a){return s+a.length;},0);

  document.getElementById('detail-title').textContent = aisle + ' · Bay ' + String(bay).padStart(2,'0');
  document.getElementById('detail-tags').innerHTML =
    '<div class="detail-tag">Direction: ' + dir + '</div>' +
    '<div class="detail-tag">' + shelfLetters.length + ' shelves</div>' +
    '<div class="detail-tag">' + totalLocs + ' locations</div>';

  const body = document.getElementById('detail-body');
  body.innerHTML = '';

  shelfLetters.forEach(function(sl) {
    const items   = shelves[sl];
    const primary = items[0];
    const sc      = getShelfClass(primary.type, primary.inactive);
    const isWhole = sl === 'WHOLE';

    const section = document.createElement('div');
    section.className = 'detail-shelf-section';

    const head = document.createElement('div');
    head.className = 'detail-shelf-head';
    head.innerHTML = '<div class="detail-shelf-name">' + (isWhole ? 'ENTIRE BAY' : 'SHELF ' + sl) + '</div>' +
      '<div class="detail-shelf-badge ' + sc + '-badge">' + (primary.type||'UNKNOWN') + '</div>';
    section.appendChild(head);

    items.forEach(function(item) {
      const empty = !item.desc || item.inactive === 'Yes';
      const desc  = item.desc || (item.inactive==='Yes' ? 'Inactive' : 'Empty');
      const row = document.createElement('div');
      row.className = 'detail-item';
      row.innerHTML = '<div class="detail-item-pos">' + String(item.pos).padStart(2,'0') + '</div>' +
        '<div class="detail-item-name' + (empty?' empty':'') + '">' + desc + '</div>';
      section.appendChild(row);
    });
    body.appendChild(section);
  });

  document.getElementById('detail-panel').classList.add('open');
}



// ── SEARCH ──
var searchInput = document.getElementById('search-input');
var searchClear = document.getElementById('search-clear');

function handleSearch() {
  var q = searchInput.value;
  searchClear.classList.toggle('visible', q.length > 0);
  if (currentView === 'list') {
    renderList(q);
  } else {
    var query = q.toUpperCase().trim();
    if (!query) { renderWarehouse(); return; }
    var matchedLocs = new Set();
    var matchedBays = new Set();
    allLocations.forEach(function(loc) {
      if (loc.aisle !== currentAisle) return;
      if (loc.loc.toUpperCase().indexOf(query) >= 0 || loc.desc.toUpperCase().indexOf(query) >= 0) {
        matchedLocs.add(loc.loc); matchedBays.add(loc.bay);
      }
    });
    renderWarehouse(matchedBays, matchedLocs);
  }
}

searchInput.addEventListener('input',          handleSearch);
searchInput.addEventListener('keyup',          handleSearch);
searchInput.addEventListener('change',         handleSearch);
searchInput.addEventListener('compositionend', handleSearch);
// Polling fallback for Android Chrome
var lastSearchVal = '';
setInterval(function() {
  var el = document.getElementById('search-input');
  if (!el) return;
  var val = el.value;
  if (val !== lastSearchVal) {
    lastSearchVal = val;
    handleSearch();
  }
}, 200);



// ── EXPORT ──
document.getElementById('export-btn').addEventListener('click', function() {
  // Export data as warehouse_data.json — upload this to your GitHub repo
  var loadedAt = new Date().toLocaleString();
  var payload  = JSON.stringify({warehouseData: warehouseData, allLocations: allLocations, loadedAt: loadedAt}, null, 2);
  var blob = new Blob([payload], {type:'application/json;charset=utf-8'});
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href = url;
  a.download = 'warehouse_data.json';
  document.body.appendChild(a);
  a.click();
  setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); }, 200);
});

// ── FILE HANDLING ──
document.getElementById('file-input').addEventListener('change', function(e) {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});

var dropZone = document.getElementById('drop-zone');
dropZone.addEventListener('dragover', function(e){ e.preventDefault(); });
dropZone.addEventListener('drop', function(e){
  e.preventDefault();
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});

function handleFile(file) {
  var ext = file.name.split('.').pop().toLowerCase();
  var reader = new FileReader();
  if (ext === 'csv') {
    reader.onload = function(e) {
      parseData(Papa.parse(e.target.result, {skipEmptyLines:true}).data);
    };
    reader.readAsText(file);
  } else {
    reader.onload = function(e) {
      var wb   = XLSX.read(e.target.result, {type:'array'});
      var ws   = wb.Sheets[wb.SheetNames[0]];
      var rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
      parseData(rows);
    };
    reader.readAsArrayBuffer(file);
  }
}

// ── LOAD ON STARTUP ──
function applyData(src) {
  warehouseData = src.warehouseData;
  allLocations  = src.allLocations;
  var aisles    = Object.keys(warehouseData).sort();
  currentAisle  = aisles[0];
  buildAisleTabs(aisles);
  showUI();
  renderList('');
  document.getElementById('status-badge').textContent = allLocations.length + ' locs · ' + aisles.length + ' aisles';
  document.getElementById('status-badge').className = 'status-badge loaded';
  document.getElementById('export-btn').style.display = '';
  document.getElementById('update-btn').style.display = '';
}

function loadFromStorage() {
  // Try fetching warehouse_data.json from same directory (GitHub Pages)
  fetch('warehouse_data.json')
    .then(function(r) {
      if (!r.ok) throw new Error('No JSON file');
      return r.json();
    })
    .then(function(src) {
      applyData(src);
    })
    .catch(function() {
      // Fallback to localStorage for desktop use
      try {
        var wd = localStorage.getItem('warehouseData');
        var al = localStorage.getItem('allLocations');
        var at = localStorage.getItem('warehouseLoadedAt');
        if (wd && al) {
          applyData({ warehouseData: JSON.parse(wd), allLocations: JSON.parse(al), loadedAt: at });
        }
      } catch(e) {}
    });
}

loadFromStorage();

function clearSearch() {
  document.getElementById('search-input').value = '';
  document.getElementById('search-clear').classList.remove('visible');
  if (currentView === 'list') renderList('');
  else renderWarehouse();
  document.getElementById('detail-panel').classList.remove('open');
}

</script>
